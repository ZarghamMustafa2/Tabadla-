<svg width="200" height="150" viewBox="0 0 200 150" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#BF953F;stop-opacity:1" />
            <stop offset="25%" style="stop-color:#FCF6BA;stop-opacity:1" />
            <stop offset="50%" style="stop-color:#B38728;stop-opacity:1" />
            <stop offset="75%" style="stop-color:#FBF5B7;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#AA771C;stop-opacity:1" />
        </linearGradient>
    </defs>
    
    <!-- Exchange Circle (Arrows) -->
    <path d="M 60 70 A 40 40 0 1 1 140 70 A 40 40 0 1 1 60 70" fill="none" stroke="url(#goldGradient)" stroke-width="6" stroke-dasharray="180 50" />
    <polygon points="140,65 150,75 130,75" fill="url(#goldGradient)" transform="rotate(45 140 70)" />
    <polygon points="60,75 50,65 70,65" fill="url(#goldGradient)" transform="rotate(45 60 70)" />
    
    <!-- Hanger Icon -->
    <path d="M 100 45 C 105 45 105 35 100 35 C 95 35 95 45 100 45 Z" fill="none" stroke="url(#goldGradient)" stroke-width="4" />
    <path d="M 100 45 L 100 55 L 70 85 L 130 85 L 100 55" fill="none" stroke="url(#goldGradient)" stroke-width="4" stroke-linejoin="round" />
    
    <!-- Tabadla Text -->
    <text x="100" y="130" font-family="Serif, 'Times New Roman'" font-size="28" font-weight="700" fill="#333" text-anchor="middle" letter-spacing="4">TABADLA</text>
</svg>
